<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Fantasy withdrawal · Dream11 style</title>
  <style>
    /* ----- CSS reset & modern font ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f4f7fc 0%, #e9eef4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      margin: 0;
    }

    /* main card – android friendly */
    .withdrawal-container {
      max-width: 400px;
      width: 100%;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 40px 40px 28px 28px;
      box-shadow: 0 20px 40px -12px rgba(0,20,40,0.4), 0 4px 12px 0 rgba(0,0,0,0.08);
      padding: 22px 18px 32px 18px;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.7);
    }

    .logo-area {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }
    .logo-img {
      max-width: 160px;
      background: white;
      border-radius: 50px;
      padding: 8px 20px;
      box-shadow: 0 10px 18px -8px rgba(0,40,80,0.3);
      border: 1px solid rgba(255,255,255,0.9);
    }
    .logo-img img {
      width: 100%;
      height: auto;
      max-height: 48px;
      object-fit: contain;
      display: block;
    }

    .winning-header {
      text-align: center;
      margin-bottom: 18px;
    }
    .congrats {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1f384f;
      background: rgba(255,255,255,0.7);
      padding: 6px 14px;
      border-radius: 50px;
      display: inline-block;
      backdrop-filter: blur(2px);
      margin-bottom: 8px;
    }
    .winning-amount-large {
      font-size: 2.3rem;
      font-weight: 800;
      line-height: 1.2;
      background: linear-gradient(135deg, #0f2b3f, #1b4a6f);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      text-shadow: 0 5px 10px rgba(0,60,130,0.2);
      word-break: break-word;
    }
    .winning-amount-large span {
      font-size: 1.7rem;
      font-weight: 500;
      color: #496f92;
    }

    .prize-card {
      background: white;
      border-radius: 30px;
      padding: 18px 16px;
      margin: 16px 0 18px 0;
      box-shadow: 0 18px 30px -16px rgba(20, 40, 70, 0.3), inset 0 1px 4px white;
      border: 1px solid rgba(255,255,255,0.9);
    }

    .user-greeting {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 16px;
      background: #e2f0e8;
      padding: 8px 16px;
      border-radius: 40px;
      display: inline-block;
      color: #0b5730;
      border-left: 5px solid #2b8c5e;
      box-shadow: 0 5px 10px rgba(0,80,50,0.08);
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-greeting i {
      font-style: normal;
      background: #178f4f;
      color: white;
      padding: 2px 10px;
      border-radius: 30px;
      margin-left: 8px;
      font-weight: 500;
      font-size: 0.95rem;
      display: inline-block;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 2px;
      border-bottom: 1px solid #ecf1f6;
      flex-wrap: wrap;
      gap: 5px;
    }
    .info-row:last-child {
      border-bottom: none;
    }
    .info-label {
      color: #43586e;
      font-weight: 500;
      font-size: 1rem;
    }
    .info-value {
      font-weight: 700;
      font-size: 1.1rem;
    }
    .highlight-green {
      color: #1c8b4c;
      background: #dcfce7;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .rank-badge {
      background: #232f49;
      color: white;
      padding: 5px 16px;
      border-radius: 40px;
      font-weight: 700;
      box-shadow: 0 4px 8px rgba(0,30,60,0.3);
      font-size: 1rem;
    }
    .contest-name {
      font-weight: 700;
      color: #17222e;
      background: #f2f6fd;
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.95rem;
    }
    .winning-amount-card {
      color: #b45f2b;
      background: #fff1e0;
      padding: 4px 16px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.2rem;
    }

    .withdraw-btn {
      width: 100%;
      background: linear-gradient(105deg, #1e2b4a, #294d73, #126b5e);
      border: none;
      padding: 18px 16px;
      border-radius: 70px;
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 20px 28px -14px #0b3050, 0 4px 10px rgba(0,20,10,0.3);
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.3);
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .withdraw-btn:active {
      transform: scale(0.98);
      box-shadow: 0 12px 20px -8px #021d30;
    }

    /* ----- modals ----- */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 20, 30, 0.6);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 999;
      animation: fadeIn 0.2s ease;
    }
    .modal-content {
      background: white;
      max-width: 340px;
      width: 100%;
      border-radius: 44px;
      padding: 28px 20px 30px 20px;
      box-shadow: 0 30px 50px -10px #031120;
      text-align: center;
      border: 2px solid rgba(255,255,255,0.8);
      animation: slideUp 0.25s ease;
      margin: 0 12px;
    }
    .modal-content p {
      font-size: 1.3rem;
      font-weight: 600;
      color: #1b2f44;
      line-height: 1.4;
      margin-bottom: 18px;
    }
    .gst-amount {
      background: #ecf7ff;
      padding: 16px 8px;
      border-radius: 42px;
      font-size: 2.3rem;
      font-weight: 800;
      color: #17487a;
      margin: 14px 0 20px;
      border: 1px dashed #3e7eb3;
    }
    .gst-amount small {
      font-size: 1.2rem;
      font-weight: 500;
      color: #38658f;
    }
    .pay-now-btn {
      background: linear-gradient(145deg, #1c3d5e, #0f614e);
      border: none;
      color: white;
      font-size: 1.6rem;
      font-weight: 700;
      padding: 16px 20px;
      border-radius: 100px;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 20px 25px -14px #09432b;
      transition: 0.15s;
      border: 1px solid #93d4bc;
      -webkit-tap-highlight-color: transparent;
    }
    .pay-now-btn:active {
      transform: scale(0.97);
      box-shadow: 0 12px 18px -10px #063a27;
    }
    .close-modal {
      margin-top: 18px;
      background: transparent;
      border: none;
      color: #728ea7;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      padding: 10px 16px;
      border-radius: 40px;
      -webkit-tap-highlight-color: transparent;
    }
    .close-modal:active {
      background: #f0f4fc;
    }

    /* QR modal – without any "i have paid" button */
    .qr-modal-content {
      text-align: center;
    }
    .qr-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1b2f44;
      margin-bottom: 12px;
    }
    .qr-code-image {
      max-width: 220px;
      width: 100%;
      height: auto;
      border-radius: 28px;
      background: white;
      padding: 12px;
      box-shadow: 0 15px 24px -12px #142f46;
      margin: 8px auto 18px;
      border: 1px solid #e2ecf9;
    }
    .qr-code-image img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 16px;
    }
    .qr-instruction {
      font-size: 1.1rem;
      color: #1f4d6e;
      background: #e6f0fa;
      padding: 14px 12px;
      border-radius: 50px;
      font-weight: 500;
      margin-bottom: 20px;
    }
    /* simple close button only – no extra action */
    .qr-close-btn {
      background: #f2f6fc;
      border: 1.5px solid #b6cde0;
      color: #2b4b6f;
      font-size: 1.3rem;
      font-weight: 600;
      padding: 14px 18px;
      border-radius: 60px;
      width: 100%;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .qr-close-btn:active {
      background: #dde6f2;
      transform: scale(0.98);
    }

    /* animations */
    @keyframes fadeIn {
      0% { opacity: 0; } 100% { opacity: 1; }
    }
    @keyframes slideUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .footer-note {
      text-align: center;
      color: #637e9b;
      margin-top: 16px;
      font-size: 0.85rem;
    }
    button {
      touch-action: manipulation;
    }
  </style>
</head>
<body>

<div class="withdrawal-container">
  <!-- LOGO -->
  <div class="logo-area">
    <div class="logo-img">
      <img src="https://github.com/user-attachments/assets/9d722eec-f5d9-4f49-8053-833bbcb93a00" 
           alt="Fantasy Sports"
           onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22160%22%20height%3D%2248%22%20viewBox%3D%220%200%20160%2048%22%3E%3Crect%20width%3D%22160%22%20height%3D%2248%22%20fill%3D%22%231d267d%22%20rx%3D%2224%22%2F%3E%3Ctext%20x%3D%2230%22%20y%3D%2232%22%20font-family%3D%22Arial%22%20font-size%3D%2218%22%20fill%3D%22%23ffffff%22%3EFANTASY%3C%2Ftext%3E%3C%2Fsvg%3E';">
    </div>
  </div>

  <!-- winning header -->
  <div class="winning-header">
    <div class="congrats">🏆 You secured Rank #4</div>
    <div class="winning-amount-large" id="dynamicWinningAmount">₹4,00,000 <span>🏆</span></div>
  </div>

  <!-- prize card -->
  <div class="prize-card">
    <div class="user-greeting">
      Dear user <i>User491609(WRBX0)</i>
    </div>
    <div class="info-row">
      <span class="info-label">Rank</span>
      <span class="info-value rank-badge">#4</span>
    </div>
    <div class="info-row">
      <span class="info-label">Status</span>
      <span class="info-value highlight-green">Winning Confirmed ✅</span>
    </div>
    <div class="info-row">
      <span class="info-label">Winning Amount</span>
      <span class="info-value winning-amount-card" id="cardWinningAmount">₹4,00,000</span>
    </div>
    <div class="info-row">
      <span class="info-label">Contest</span>
      <span class="info-value contest-name">Mega Grand League</span>
    </div>

    <button class="withdraw-btn" id="withdrawNowBtn">💸 Withdraw Now</button>
  </div>

  <div class="footer-note">⚡ secure & instant withdrawal</div>
</div>

<!-- GST MODAL (first popup) -->
<div class="modal" id="gstModal">
  <div class="modal-content">
    <p>To withdraw, pay 10% GST</p>
    <div class="gst-amount">
      ₹16,000 <small>GST</small>
    </div>
    <button class="pay-now-btn" id="payNowBtn">Pay Now</button>
    <button class="close-modal" id="closeModalBtn">✕ cancel</button>
  </div>
</div>

<!-- QR MODAL – WITHOUT "I HAVE PAID" BUTTON, only close option -->
<div class="modal" id="qrModal">
  <div class="modal-content qr-modal-content">
    <div class="qr-title">📲 Scan to pay GST</div>
    <div class="qr-code-image">
      <img src="https://github.com/user-attachments/assets/9155ca98-b1bb-4f7a-b9bf-2a5403d48211" 
           alt="UPI QR"
           onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22200%22%20viewBox%3D%220%200%20200%20200%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%23eef3fc%22%2F%3E%3Ctext%20x%3D%2235%22%20y%3D%22115%22%20font-family%3D%22Arial%22%20font-size%3D%2218%22%20fill%3D%22%231a3b5c%22%3EQR%20CODE%3C%2Ftext%3E%3C%2Fsvg%3E';">
    </div>
    <div class="qr-instruction">Use any UPI app to pay ₹16,000</div>
    <!-- Only a close button, no "I have paid" -->
    <button class="qr-close-btn" id="closeQrBtn">✕ Close</button>
  </div>
</div>

<script>
  (function() {
    // editable winning amount
    const winningAmountEditable = "₹4,00,000";   // change if needed
    
    const topAmountSpan = document.getElementById('dynamicWinningAmount');
    const cardAmountSpan = document.getElementById('cardWinningAmount');
    if (topAmountSpan) {
      topAmountSpan.innerHTML = `${winningAmountEditable} <span>prize</span>`;
    }
    if (cardAmountSpan) {
      cardAmountSpan.innerText = winningAmountEditable;
    }

    // elements
    const withdrawBtn = document.getElementById('withdrawNowBtn');
    const gstModal = document.getElementById('gstModal');
    const qrModal = document.getElementById('qrModal');
    
    const payNowBtn = document.getElementById('payNowBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');   // closes GST
    const closeQrBtn = document.getElementById('closeQrBtn');         // closes QR

    function closeAllModals() {
      gstModal.style.display = 'none';
      qrModal.style.display = 'none';
    }

    // open GST modal
    withdrawBtn.addEventListener('click', function() {
      closeAllModals();
      gstModal.style.display = 'flex';
    });

    // close GST via cancel
    if (closeModalBtn) {
      closeModalBtn.addEventListener('click', closeAllModals);
    }

    // pay now -> hide GST, show QR (only QR, no extra button)
    payNowBtn.addEventListener('click', function() {
      gstModal.style.display = 'none';
      qrModal.style.display = 'flex';
    });

    // close QR via its close button
    if (closeQrBtn) {
      closeQrBtn.addEventListener('click', closeAllModals);
    }

    // click outside modal to close (for both)
    gstModal.addEventListener('click', function(e) {
      if (e.target === gstModal) closeAllModals();
    });
    qrModal.addEventListener('click', function(e) {
      if (e.target === qrModal) closeAllModals();
    });

    // ESC key closes
    window.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if (gstModal.style.display === 'flex' || qrModal.style.display === 'flex') {
          closeAllModals();
        }
      }
    });
  })();
</script>
<!-- 
  No "I have paid" button – only QR code with simple close.
  Fully android-friendly: large touch targets, proper viewport, no hover.
-->
</body>
</html>
